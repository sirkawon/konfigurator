    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 30px;
            color: #343a40;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header img {
            max-width: 220px;
            height: auto;
        }
        .header h1 {
            color: #212529;
            font-size: 2em;
            margin: 15px 0;
            font-weight: 700;
        }
        .step {
            margin-bottom: 40px;
        }
        .step h2 {
            color: #212529;
            font-size: 1.6em;
            margin-bottom: 15px;
            font-weight: 500;
        }
        select {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 1em;
            background-color: #fff;
            transition: border-color 0.3s;
        }
        select:focus {
            border-color: #212529;
            outline: none;
        }
        .frame-types {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }
        .frame-card {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            background-color: #fff;
        }
        .frame-card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .frame-card h3 {
            font-size: 1.2em;
            margin: 0 0 10px;
            color: #212529;
            font-weight: 500;
        }
        .frame-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(33, 37, 41, 0.15);
            border-color: #212529;
        }
        .frame-card.selected {
            border-color: #212529;
            background-color: #e9ecef;
            box-shadow: 0 4px 8px rgba(33, 37, 41, 0.2);
        }
        .confirmation {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            background: linear-gradient(to bottom, #ffffff, #f8f9fa);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }
        .confirmation p {
            margin: 0 0 15px;
            font-size: 1.1em;
            color: #495057;
        }
        .confirmation button {
            background-color: #212529;
            color: #fff;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        .confirmation button:hover {
            background-color: #343a40;
        }
        .advice {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.6;
            color: #495057;
        }
        .advice a {
            color: #212529;
            text-decoration: none;
        }
        .advice a:hover {
            text-decoration: underline;
        }

        .advice-poziome { background-color: #e6ffe6; }

        @media (max-width: 600px) {

            }

    window.open(selectedFrame.links[widthSelect.value][lengthSelect.value], '_blank');
};
                advice.innerHTML = selectedFrame.advice;
                advice.className = `advice ${selectedFrame.adviceClass}`;
            } else {
                confirmation.style.display = 'none';
            }
        }

        widthSelect.addEventListener('change', () => {
            selectedFrame = null;
            updateFrameTypes();
        });
        lengthSelect.addEventListener('change', () => {
            selectedFrame = null;
            updateFrameTypes();
        });
    </script>
</body>
</html>
