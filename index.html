<html lang="pl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfigurator Stelaży Kavon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime: #D5F261;
            --lime-ink: #B8D940;
            --lime-soft: #EEF9C7;
            --ink: #0A0A0A;
            --ink-2: #1F2937;
            --ink-3: #374151;
            --mute: #6B7280;
            --line: #E6E6E3;
            --paper: #FAFAF7;
            --white: #FFFFFF;
            --success: #2F7A3B;
            --radius: 14px;
            --radius-sm: 8px;
            --radius-lg: 22px;
            --shadow-md: 0 6px 24px -8px rgba(10, 10, 10, .12), 0 2px 4px rgba(10, 10, 10, .04);
            --shadow-lg: 0 20px 60px -20px rgba(10, 10, 10, .25);
            --gutter: clamp(16px, 3vw, 40px);
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: var(--ink);
            background: var(--paper);
            -webkit-font-smoothing: antialiased;
            padding: var(--gutter) 0;
        }

        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin: 0;
            text-wrap: balance;
        }

        p { margin: 0; text-wrap: pretty; }
        a { color: inherit; text-decoration: none; }
        button { font: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }
        img { display: block; max-width: 100%; }
        ::selection { background: var(--lime); color: var(--ink); }

        .mono {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            letter-spacing: 0;
        }

        /* ===== Container ===== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--white);
            padding: clamp(28px, 4vw, 56px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--line);
        }

        /* ===== Header ===== */
        .header {
            text-align: left;
            padding-bottom: 28px;
            margin-bottom: 36px;
            border-bottom: 1px dashed var(--line);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }
        .header img {
            max-width: 140px;
            height: auto;
        }
        .header h1 {
            font-size: clamp(22px, 2.6vw, 32px);
            color: var(--ink);
            margin: 0;
            font-weight: 600;
        }
        .header-eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--mute);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 6px;
            display: block;
        }
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--lime);
            color: var(--ink);
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }
        .header-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ink);
        }
        @media (max-width: 720px) {
            .header { grid-template-columns: auto 1fr; }
            .header-badge { display: none; }
            .header img { max-width: 100px; }
        }

        /* ===== Step ===== */
        .step { margin-bottom: 44px; position: relative; }
        .step:last-of-type { margin-bottom: 0; }
        .step h2 {
            font-size: clamp(20px, 2vw, 26px);
            color: var(--ink);
            margin-bottom: 22px;
            font-weight: 600;
            position: relative;
            padding-left: 52px;
        }
        .step h2::before {
            content: attr(data-step);
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            background: var(--ink);
            color: var(--lime);
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0;
        }

        /* ===== Selects (Krok 1) ===== */
        .size-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 640px;
        }
        .size-grid br { display: none; }
        @media (max-width: 560px) {
            .size-grid { grid-template-columns: 1fr; }
        }

        label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--mute);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            max-width: none;
            padding: 14px 44px 14px 18px;
            margin: 0;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--ink);
            background-color: var(--white);
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%230A0A0A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            transition: all .15s ease;
            cursor: pointer;
        }
        select:hover { border-color: var(--ink-3); }
        select:focus {
            border-color: var(--ink);
            outline: none;
            box-shadow: 0 0 0 4px rgba(213, 242, 97, .35);
            background-color: var(--white);
        }

        /* ===== Frame cards (Krok 2) ===== */
        .frame-types {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .frame-card {
            position: relative;
            border: 1.5px solid var(--line);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .frame-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            border-radius: var(--radius-sm);
            margin: 0;
            background: var(--paper);
        }
        .frame-card h3 {
            font-size: 15px;
            margin: 0;
            color: var(--ink);
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .frame-card::after {
            content: '';
            position: absolute;
            top: 14px;
            right: 14px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid var(--line);
            background: var(--white);
            transition: all .15s ease;
        }
        .frame-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--ink-3);
        }
        .frame-card:hover::after { border-color: var(--ink-3); }
        .frame-card.selected {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px var(--lime-soft), var(--shadow-md);
            background-color: var(--white);
        }
        .frame-card.selected::after {
            background: var(--ink);
            border-color: var(--ink);
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23D5F261' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='20 6 9 17 4 12'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: center;
        }

        /* ===== Confirmation ===== */
        .confirmation {
            display: none;
            margin-top: 40px;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: var(--ink);
            color: var(--white);
            position: relative;
            overflow: hidden;
        }
        .confirmation::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .6), transparent);
        }
        .confirmation > * { position: relative; z-index: 1; }
        .confirmation::after {
            content: 'READY';
            position: absolute;
            top: 22px;
            right: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--lime);
            letter-spacing: 0.15em;
            padding-left: 16px;
            z-index: 2;
        }
        .confirmation p {
            margin: 0 0 20px;
            font-size: 17px;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            color: var(--white);
            padding-right: 90px;
            line-height: 1.35;
        }
        #productButton {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--lime);
            color: var(--ink);
            padding: 14px 24px;
            border: 1.5px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            line-height: 1;
            transition: all .15s ease;
        }
        #productButton::after {
            content: '→';
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
        }
        #productButton:hover {
            background-color: #C9EA4E;
            transform: translateY(-1px);
            box-shadow: 0 10px 24px -10px rgba(181, 214, 60, .9);
        }
        #productButton:focus-visible {
            outline: 3px solid var(--lime);
            outline-offset: 3px;
        }

        /* Pulsing dot on READY label */
        .confirmation::after {
            display: inline-block;
        }
        .confirmation .ready-dot {
            position: absolute;
            top: 27px;
            right: 78px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--lime);
            box-shadow: 0 0 0 0 rgba(213, 242, 97, .7);
            animation: pulse 2s infinite;
            z-index: 3;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(213, 242, 97, .7); }
            70% { box-shadow: 0 0 0 8px rgba(213, 242, 97, 0); }
            100% { box-shadow: 0 0 0 0 rgba(213, 242, 97, 0); }
        }

        /* ===== Advice ===== */
        .advice {
            margin-top: 22px;
            padding: 18px 20px 18px 22px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.65;
            color: rgba(255, 255, 255, .82);
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-left: 3px solid var(--lime);
        }
        .advice p { margin: 0; }
        .advice a {
            color: var(--lime);
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
        }
        .advice a:hover {
            color: var(--white);
            text-decoration-color: var(--lime);
            text-decoration-thickness: 2px;
        }

        /* Per-type accent on the left border (subtle, editorial) */
        .advice-klasyczne   { border-left-color: #6EC1FF; }
        .advice-poziome     { border-left-color: var(--lime); }
        .advice-latwe       { border-left-color: #FF8A7A; }
        .advice-samonosny   { border-left-color: #B79CFF; }
        .advice-wklad       { border-left-color: #FFB061; }
        .advice-polkotapczan{ border-left-color: #8AA4FF; }

        /* ===== Mobile ===== */
        @media (max-width: 600px) {
            body { padding: 0; }
            .container {
                padding: 24px 20px;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
                box-shadow: none;
            }
            .frame-types { grid-template-columns: 1fr; }
            .step h2 {
                padding-left: 46px;
                font-size: 20px;
            }
            .step h2::before {
                width: 34px;
                height: 34px;
                font-size: 12px;
                border-radius: 10px;
            }
            .confirmation { padding: 22px; }
            .confirmation p { padding-right: 0; padding-top: 28px; }
            .confirmation::after { top: 18px; }
            .confirmation .ready-dot { top: 23px; right: 74px; }
        }
    </style>
</head>
